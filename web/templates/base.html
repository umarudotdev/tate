<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ config.title }}{% endblock title %}</title>
  <meta name="description" content="{% block description %}{{ config.description }}{% endblock description %}">

  <!-- Open Graph -->
  <meta property="og:title" content="{% block og_title %}{{ config.title }}{% endblock og_title %}">
  <meta property="og:description" content="{% block og_description %}{{ config.description }}{% endblock og_description %}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ current_url | default(value=config.base_url) }}">

  <link rel="icon" href="{{ get_url(path='favicon.svg') }}" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ get_url(path='style.css') }}">
  <noscript>
    <style>.reveal, .hero-reveal { opacity: 1; transform: none; animation: none; }</style>
  </noscript>
</head>
<body>
  <nav class="nav">
    <ul class="nav__list">
      <li class="nav__home">
        <a href="{{ config.base_url }}" class="nav__link{% if current_path == '/' %} nav__link--active{% endif %}">
          <span class="nav__kanji">盾</span>tate
        </a>
      </li>
      <li class="nav__divider"></li>
      <li>
        <a href="{{ get_url(path='@/docs/_index.md') }}" class="nav__link{% if current_path is starting_with('/docs') %} nav__link--active{% endif %}">Docs</a>
      </li>
      <li>
        <a href="{{ config.extra.github_url }}" class="nav__link nav__link--icon" rel="noopener noreferrer" target="_blank" title="GitHub">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
        </a>
      </li>
      <li>
        <a href="{{ get_url(path='@/docs/installation.md') }}" class="nav__link nav__link--cta">Install</a>
      </li>
    </ul>
  </nav>

  {% block content %}{% endblock content %}

  <footer class="footer">
    <div class="container">
      <div class="footer__brand">
        <span class="footer__logo">盾 tate</span>
        <p class="footer__tagline">Spaced repetition for code you don't own yet.</p>
      </div>
      <div class="footer__links">
        <div class="footer__col">
          <div class="footer__col-title">Product</div>
          <a href="{{ get_url(path='@/docs/installation.md') }}">Install</a>
          <a href="{{ get_url(path='@/docs/_index.md') }}">Documentation</a>
          <a href="{{ get_url(path='@/docs/usage.md') }}">Usage</a>
        </div>
        <div class="footer__col">
          <div class="footer__col-title">Resources</div>
          <a href="{{ get_url(path='@/docs/configuration.md') }}">Configuration</a>
          <a href="{{ get_url(path='@/docs/agent-skill.md') }}">Agent Skill</a>
          <a href="{{ config.extra.github_url }}" rel="noopener noreferrer" target="_blank">GitHub</a>
        </div>
      </div>
      <div class="footer__bottom">
        <span>MIT License</span>
      </div>
    </div>
  </footer>

  <script src="{{ get_url(path='scroll-reveal.js') }}" defer></script>
</body>
</html>
