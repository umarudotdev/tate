name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: tate-linux-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: tate-darwin-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: tate-darwin-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: cargo build --release -p tate-cli --target "$BUILD_TARGET"

      - name: Rename binary
        env:
          BUILD_TARGET: ${{ matrix.target }}
          ARTIFACT_NAME: ${{ matrix.name }}
        run: cp "target/$BUILD_TARGET/release/tate" "$ARTIFACT_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: tate-*
          generate_release_notes: true
